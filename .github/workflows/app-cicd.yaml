name: Java App CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  id-token: write
  contents: read

env:
  JAVA_VERSION: "17"

jobs:
# ==============================
# 1. BUILD + SCAN + PUSH
# ==============================
  build_scan_push:
    runs-on: ubuntu-latest

    outputs:
      image_tag: ${{ steps.image.outputs.tag }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin

      - name: Build Java application
        run: mvn clean package -DskipTests

      # --------------------------
      # Code vulnerability scan
      # --------------------------
      - name: Trivy source scan
        uses: aquasecurity/trivy-action@0.20.0
        with:
          scan-type: fs
          severity: HIGH,CRITICAL
          exit-code: 1

      # --------------------------
      # AWS OIDC Auth
      # --------------------------
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      # --------------------------
      # Build & push Docker image
      # --------------------------
      - name: Build and Push Image
        id: image
        run: |
          IMAGE_TAG=${GITHUB_SHA}
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          IMAGE_URI=$ACCOUNT_ID.dkr.ecr.${{ vars.AWS_REGION }}.amazonaws.com/${{ vars.ECR_REPO }}

          docker build -t $IMAGE_URI:$IMAGE_TAG .
          docker tag $IMAGE_URI:$IMAGE_TAG $IMAGE_URI:latest

          docker push $IMAGE_URI:$IMAGE_TAG
          docker push $IMAGE_URI:latest

          echo "tag=$IMAGE_TAG" >> $GITHUB_OUTPUT

      # --------------------------
      # Image vulnerability scan
      # --------------------------
      - name: Trivy image scan
        uses: aquasecurity/trivy-action@0.20.0
        with:
          image-ref: ${{ steps.image.outputs.tag }}
          severity: HIGH,CRITICAL
          exit-code: 1

# ==============================
# 2. DEPLOY TO PREPROD (AUTO)
# ==============================
  deploy_preprod:
    needs: build_scan_push
    runs-on: ubuntu-latest
    environment: preprod

    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Deploy to Preprod (ASG Refresh)
        run: |
          aws autoscaling start-instance-refresh \
            --auto-scaling-group-name ${{ vars.ASG_NAME }} \
            --preferences MinHealthyPercentage=80

# ==============================
# 3. DEPLOY TO PROD (MANUAL)
# ==============================
  deploy_prod:
    needs: deploy_preprod
    runs-on: ubuntu-latest
    environment: prod   # 👈 Manual approval enforced here

    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Deploy to Prod (ASG Refresh)
        run: |
          aws autoscaling start-instance-refresh \
            --auto-scaling-group-name ${{ vars.ASG_NAME }} \
            --preferences MinHealthyPercentage=90